<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"
  >
  <meta name="description" content="크루즈 여행자를 위한 제주 여행 앱 CRUJEJU">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="crujeju">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CRUJEJU</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --app-height: 100dvh;
    }

    html,
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: var(--app-height);
      min-height: var(--app-height);
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body > flutter-view {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: var(--app-height) !important;
    }
  </style>
</head>
<body>
  <script>
    (() => {
      const root = document.documentElement;
      const viewport = window.visualViewport;
      let heightBeforeKeyboard = 0;
      let previousViewportHeight =
        Math.round(viewport?.height ?? window.innerHeight);
      let resizeFrame = 0;

      const currentViewportHeight = () =>
        Math.round(viewport?.height ?? window.innerHeight);

      const resetPageOffset = () => {
        window.scrollTo(0, 0);
        root.scrollTop = 0;
        document.body.scrollTop = 0;
      };

      const applyViewportHeight = (height = currentViewportHeight()) => {
        if (!Number.isFinite(height) || height <= 0) return;
        root.style.setProperty('--app-height', `${height}px`);
        resetPageOffset();
      };

      const notifyFlutterOfResize = () => {
        applyViewportHeight();
        window.dispatchEvent(new Event('resize'));
      };

      const scheduleViewportSync = (notifyFlutter = false) => {
        cancelAnimationFrame(resizeFrame);
        resizeFrame = requestAnimationFrame(() => {
          applyViewportHeight();
          if (notifyFlutter) {
            window.dispatchEvent(new Event('resize'));
          }
        });
      };

      viewport?.addEventListener('resize', () => {
        const nextViewportHeight = currentViewportHeight();
        const keyboardClosed =
          nextViewportHeight > previousViewportHeight + 80;

        scheduleViewportSync(keyboardClosed);

        if (keyboardClosed) {
          [80, 180, 320].forEach((delay) => {
            window.setTimeout(notifyFlutterOfResize, delay);
          });
        }

        previousViewportHeight = nextViewportHeight;
      });

      window.addEventListener('resize', () => {
        scheduleViewportSync();
      });

      document.addEventListener(
        'focusin',
        (event) => {
          const target = event.target;
          if (
            target instanceof HTMLInputElement ||
            target instanceof HTMLTextAreaElement ||
            target?.isContentEditable
          ) {
            heightBeforeKeyboard = currentViewportHeight();
          }
        },
        true,
      );

      document.addEventListener(
        'focusout',
        () => {
          [80, 180, 320].forEach((delay) => {
            window.setTimeout(() => {
              const restoredHeight = Math.max(
                currentViewportHeight(),
                heightBeforeKeyboard,
              );
              applyViewportHeight(restoredHeight);
              window.dispatchEvent(new Event('resize'));
            }, delay);
          });
        },
        true,
      );

      window.addEventListener('orientationchange', () => {
        heightBeforeKeyboard = 0;
        window.setTimeout(notifyFlutterOfResize, 200);
      });

      window.addEventListener('pageshow', () => {
        heightBeforeKeyboard = 0;
        notifyFlutterOfResize();
      });

      applyViewportHeight(previousViewportHeight);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
