<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="크루즈 여행자를 위한 제주 여행 앱 CRUJEJU">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="crujeju">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CRUJEJU</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
    }
  </style>
</head>
<body>
  <script>
    (() => {
      const resetPageOffset = () => {
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
      };

      const viewport = window.visualViewport;
      let previousViewportHeight = viewport?.height ?? window.innerHeight;

      viewport?.addEventListener('resize', () => {
        const nextViewportHeight = viewport.height;
        if (nextViewportHeight > previousViewportHeight + 80) {
          requestAnimationFrame(resetPageOffset);
        }
        previousViewportHeight = nextViewportHeight;
      });

      document.addEventListener(
        'focusout',
        () => window.setTimeout(resetPageOffset, 120),
        true,
      );
      window.addEventListener('pageshow', resetPageOffset);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
